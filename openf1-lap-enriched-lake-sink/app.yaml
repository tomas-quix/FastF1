name: OpenF1 Lap Enriched Lake Sink
language: python
variables:
  - name: INPUT_TOPIC
    inputType: InputTopic
    description: Lap-enriched car telemetry topic
    defaultValue: openf1-car-data-lap-enriched
    required: true
  - name: TABLE_NAME
    inputType: FreeText
    description: QuixLake table name
    defaultValue: car_telemetry
    required: false
  - name: S3_PREFIX
    inputType: FreeText
    description: Blob storage path prefix for the data lake
    defaultValue: data-lake/time-series
    required: false
  - name: CONSUMER_GROUP
    inputType: FreeText
    description: Kafka consumer group identifier
    defaultValue: openf1-lap-enriched-lake-sink-v1
    required: false
dockerfile: build/dockerfile
runEntryPoint: main.py
defaultFile: main.py
