# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 2.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: MongoDB
    group: Configuration Managment
    application: mongodb
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 800
    state:
      enabled: true
      size: 1
    network:
      serviceName: mongodb
      ports:
        - port: 27017
          targetPort: 27017
  - name: Dynamic Configuration Manager
    group: Configuration Managment
    application: DynamicConfiguration
    version: latest
    deploymentType: Managed
    resources:
      limits:
        cpu: 500
        memory: 1000
    publicAccess:
      enabled: true
      urlPrefix: config-api-svc
    configuration:
      topic: config-ui
      mongoHost: mongodb
      mongoPort: 27017
      mongoUser: admin
      mongoPasswordSecret: MONGO_ROOT_PASSWORD
      mongoDatabase: configurations
      mongoCollection: configurations
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
  - name: OpenF1 Metadata Sink
    application: openf1-metadata-sink
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 300
    desiredStatus: Running
  - name: OpenF1 Importer
    application: openf1-importer
    version: latest
    deploymentType: Job
    resources:
      limits:
        cpu: 500
        memory: 1000
    variables:
      - name: OPENF1_MEETING
        value: Monza
  - name: OpenF1 Car Data Enricher
    application: openf1-car-data-enricher
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 500
    desiredStatus: Running
    variables:
      - name: LOOKUP_FIELDS_JSON
        value: '{"driver_full_name":"drivers.full_name","driver_acronym":"drivers.name_acronym","year":"sessions.year","circuit":"sessions.circuit_short_name","session_type":"sessions.session_type","session_name":"sessions.session_name","meeting_name":"meetings.meeting_name"}'
      - name: CONSUMER_GROUP_NAME
        value: openf1-car-data-enricher-v2
  - name: OpenF1 Lap Enricher
    application: openf1-lap-enricher
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 300
        memory: 500
    desiredStatus: Running
    variables:
      - name: CONSUMER_GROUP
        inputType: FreeText
        value: openf1-lap-enricher-v3
  - name: OpenF1 Lap Enriched Lake Sink
    application: quixlake-timeseries-destination
    version: latest
    deploymentType: Service
    desiredStatus: Running
    resources:
      limits:
        cpu: 200
        memory: 500
    variables:
      - name: input
        inputType: InputTopic
        value: openf1-car-data-lap-enriched
      - name: TABLE_NAME
        inputType: FreeText
        value: car_telemetry
      - name: HIVE_COLUMNS
        inputType: FreeText
        value: "year,circuit,session_type,session_name,driver_acronym,lap_number"
      - name: TIMESTAMP_COLUMN
        inputType: FreeText
        value: date
      - name: CONSUMER_GROUP
        inputType: FreeText
        value: openf1-lap-enriched-lake-sink-v1
      - name: AUTO_OFFSET_RESET
        inputType: FreeText
        value: earliest

# This section describes the Topics of the data pipeline
topics:
  - name: config-ui
  - name: openf1-meetings
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-sessions
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-drivers
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-laps
    configuration:
      partitions: 4
      retentionInMinutes: -1
  - name: openf1-stints
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-pit
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-position
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-intervals
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-weather
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-race-control
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-team-radio
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-car-data
    configuration:
      partitions: 4
      retentionInMinutes: -1
  - name: openf1-car-data-enriched
    configuration:
      partitions: 4
      retentionInMinutes: -1
  - name: openf1-car-data-lap-enriched
    configuration:
      partitions: 4
      retentionInMinutes: -1
      retentionInBytes: 52428800
  - name: test-data
  - name: test-laps
  - name: test-output
