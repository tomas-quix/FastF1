# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 2.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: MongoDB
    group: Configuration Managment
    application: mongodb
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 800
    network:
      serviceName: mongodb
      ports:
        - port: 27017
          targetPort: 27017
  - name: Dynamic Configuration Manager
    group: Configuration Managment
    application: DynamicConfiguration
    version: latest
    deploymentType: Managed
    resources:
      limits:
        cpu: 500
        memory: 1000
    publicAccess:
      enabled: true
      urlPrefix: config-api-svc
    configuration:
      topic: config-ui
      mongoHost: mongodb
      mongoPort: 27017
      mongoUser: admin
      mongoPasswordSecret: MONGO_ROOT_PASSWORD
      mongoDatabase: configurations
      mongoCollection: configurations
    plugin:
      embeddedView:
        enabled: true
        hideHeader: true
        default: true
  - name: OpenF1 Metadata Sink
    application: openf1-metadata-sink
    deploymentType: Service
    version: latest
    desiredStatus: Running
    resources:
      limits:
        cpu: 200
        memory: 300
      replicas: 1
    variables:
      - name: input_sessions
        inputType: InputTopic
        value: openf1-sessions
      - name: input_drivers
        inputType: InputTopic
        value: openf1-drivers
      - name: input_stints
        inputType: InputTopic
        value: openf1-stints
      - name: input_pit
        inputType: InputTopic
        value: openf1-pit
      - name: input_race_control
        inputType: InputTopic
        value: openf1-race-control
      - name: input_weather
        inputType: InputTopic
        value: openf1-weather
      - name: input_team_radio
        inputType: InputTopic
        value: openf1-team-radio
      - name: CONFIG_API_URL
        inputType: FreeText
        value: https://config-api-svc-quixdev-fastf1-dev.deployments-dev.quix.io
  - name: OpenF1 Importer
    application: openf1-importer
    deploymentType: Job
    version: latest
    desiredStatus: Stopped
    resources:
      cpu: 500
      memory: 1000
      replicas: 1
    variables:
      - name: output_sessions
        inputType: OutputTopic
        value: openf1-sessions
      - name: output_drivers
        inputType: OutputTopic
        value: openf1-drivers
      - name: output_laps
        inputType: OutputTopic
        value: openf1-laps
      - name: output_stints
        inputType: OutputTopic
        value: openf1-stints
      - name: output_pit
        inputType: OutputTopic
        value: openf1-pit
      - name: output_position
        inputType: OutputTopic
        value: openf1-position
      - name: output_intervals
        inputType: OutputTopic
        value: openf1-intervals
      - name: output_weather
        inputType: OutputTopic
        value: openf1-weather
      - name: output_race_control
        inputType: OutputTopic
        value: openf1-race-control
      - name: output_team_radio
        inputType: OutputTopic
        value: openf1-team-radio
      - name: output_car_data
        inputType: OutputTopic
        value: openf1-car-data
      - name: OPENF1_YEAR
        inputType: FreeText
        value: "2023"
      - name: OPENF1_MEETING
        inputType: FreeText
        value: Monza
      - name: OPENF1_SESSION_NAME
        inputType: FreeText
        value: Race
      - name: OPENF1_SESSION_KEY
        inputType: FreeText
        value: ""
      - name: OPENF1_BASE_URL
        inputType: FreeText
        value: https://api.openf1.org/v1
      - name: INCLUDE_CAR_DATA
        inputType: FreeText
        value: "true"

# This section describes the Topics of the data pipeline
topics:
  - name: config-ui
  - name: openf1-sessions
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-drivers
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-laps
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-stints
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-pit
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-position
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-intervals
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-weather
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-race-control
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-team-radio
    configuration:
      partitions: 1
      retentionInMinutes: -1
  - name: openf1-car-data
    configuration:
      partitions: 4
      retentionInMinutes: -1
