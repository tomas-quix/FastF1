# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: FastF1 Source
    application: fastf1-source
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 500
        memory: 1000
    desiredStatus: Running
    variables:
      - name: output_telemetry
        inputType: OutputTopic
        description: Car telemetry output topic
        required: true
        value: f1-car-telemetry
      - name: output_lap_data
        inputType: OutputTopic
        description: Lap timing output topic
        required: true
        value: f1-lap-data
      - name: output_position
        inputType: OutputTopic
        description: Position data output topic
        required: true
        value: f1-position-data
      - name: YEAR
        inputType: FreeText
        description: e.g. 2023
        value: 2023
      - name: ROUND
        inputType: FreeText
        description: e.g. 1 for Bahrain GP
        value: 1

  - name: F1 Lap Data Sink
    application: quixlake-timeseries-destination
    deploymentType: Service
    version: latest
    desiredStatus: Running
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        value: f1-lap-data
      - name: TABLE_NAME
        inputType: FreeText
        value: f1-lap-data
      - name: HIVE_COLUMNS
        inputType: FreeText
        value: "year,round,race_name"
      - name: AUTO_OFFSET_RESET
        inputType: FreeText
        value: earliest
      - name: BATCH_SIZE
        inputType: FreeText
        value: "1000"
      - name: COMMIT_INTERVAL
        inputType: FreeText
        value: "30"
      - name: KAFKA_VALUE_DESERIALIZER
        inputType: FreeText
        value: json
      - name: AUTO_DISCOVER
        inputType: FreeText
        value: "true"
      - name: CONSUMER_GROUP
        inputType: FreeText
        value: f1-lap-data-sink

  - name: F1 Telemetry Sink
    application: quixlake-timeseries-destination
    deploymentType: Service
    version: latest
    desiredStatus: Running
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        value: f1-car-telemetry
      - name: TABLE_NAME
        inputType: FreeText
        value: f1-car-telemetry
      - name: HIVE_COLUMNS
        inputType: FreeText
        value: "year,round,race_name,driver_id"
      - name: AUTO_OFFSET_RESET
        inputType: FreeText
        value: earliest
      - name: BATCH_SIZE
        inputType: FreeText
        value: "1000"
      - name: COMMIT_INTERVAL
        inputType: FreeText
        value: "30"
      - name: KAFKA_VALUE_DESERIALIZER
        inputType: FreeText
        value: json
      - name: AUTO_DISCOVER
        inputType: FreeText
        value: "true"
      - name: CONSUMER_GROUP
        inputType: FreeText
        value: f1-telemetry-sink

  - name: F1 Position Sink
    application: quixlake-timeseries-destination
    deploymentType: Service
    version: latest
    desiredStatus: Running
    resources:
      cpu: 200
      memory: 500
      replicas: 1
    variables:
      - name: input
        inputType: InputTopic
        value: f1-position-data
      - name: TABLE_NAME
        inputType: FreeText
        value: f1-position-data
      - name: HIVE_COLUMNS
        inputType: FreeText
        value: "year,round,race_name,driver_id"
      - name: AUTO_OFFSET_RESET
        inputType: FreeText
        value: earliest
      - name: BATCH_SIZE
        inputType: FreeText
        value: "1000"
      - name: COMMIT_INTERVAL
        inputType: FreeText
        value: "30"
      - name: KAFKA_VALUE_DESERIALIZER
        inputType: FreeText
        value: json
      - name: AUTO_DISCOVER
        inputType: FreeText
        value: "true"
      - name: CONSUMER_GROUP
        inputType: FreeText
        value: f1-position-sink

# This section describes the Topics of the data pipeline
topics:
  - name: f1-car-telemetry
    configuration:
      partitions: 4
      retentionInMinutes: 1440
  - name: f1-lap-data
    configuration:
      partitions: 2
      retentionInMinutes: 1440
  - name: f1-position-data
    configuration:
      partitions: 4
      retentionInMinutes: 1440
