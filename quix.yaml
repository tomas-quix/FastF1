# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: FastF1 Source
    application: fastf1-source
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 500
        memory: 1000
    desiredStatus: Running
    variables:
      - name: output_telemetry
        inputType: OutputTopic
        description: Car telemetry output topic
        required: true
        value: f1-car-telemetry
      - name: output_lap_data
        inputType: OutputTopic
        description: Lap timing output topic
        required: true
        value: f1-lap-data
      - name: output_position
        inputType: OutputTopic
        description: Position data output topic
        required: true
        value: f1-position-data
      - name: YEAR
        inputType: FreeText
        description: e.g. 2023
        value: 2023
      - name: ROUND
        inputType: FreeText
        description: e.g. 1 for Bahrain GP
        value: 1
  - name: F1 Lap Data Sink
    application: quixlake-timeseries-destination
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 500
    desiredStatus: Running
    variables:
      - name: input
        inputType: InputTopic
        value: f1-lap-data
      - name: TABLE_NAME
        inputType: FreeText
        value: f1-lap-data
      - name: HIVE_COLUMNS
        inputType: FreeText
        value: year,round,race_name
      - name: AUTO_OFFSET_RESET
        inputType: FreeText
        value: earliest
      - name: BATCH_SIZE
        inputType: FreeText
        value: 1000
      - name: COMMIT_INTERVAL
        inputType: FreeText
        value: 30
      - name: KAFKA_VALUE_DESERIALIZER
        inputType: FreeText
        value: json
      - name: AUTO_DISCOVER
        inputType: FreeText
        value: true
      - name: CONSUMER_GROUP
        inputType: FreeText
        value: f1-lap-data-sink
      - name: BLOB_PROVIDER
        inputType: FreeText
        value: Gcp
      - name: BLOB_BUCKET
        inputType: FreeText
        value: quixdevbucket
      - name: BLOB_ACCESS_KEY_ID
        inputType: FreeText
        value: GOOG6EUPNLYFI3AQUWE75USN
      - name: BLOB_SECRET_ACCESS_KEY
        inputType: Secret
        value: BLOB_SECRET_ACCESS_KEY
      - name: BLOB_SERVICE_URL
        inputType: FreeText
        value: ""
      - name: CATALOG_URL_OVERRIDE
        inputType: FreeText
        value: "http://lh-cat-aefc6306.quixdev-global.svc.cluster.local:5001"
  - name: F1 Telemetry Sink
    application: quixlake-timeseries-destination
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 500
    desiredStatus: Running
    variables:
      - name: input
        inputType: InputTopic
        description: Name of the Kafka input topic to consume from
        required: true
        value: f1-car-telemetry
      - name: TABLE_NAME
        inputType: FreeText
        description: Table name for data organization
        value: f1-car-telemetry
      - name: HIVE_COLUMNS
        inputType: FreeText
        description: Comma-separated list of columns for Hive partitioning
        value: year,round,race_name,driver_id
      - name: TIMESTAMP_COLUMN
        inputType: FreeText
        description: Column containing timestamp values
        value: timestamp
      - name: AUTO_DISCOVER
        inputType: FreeText
        description: Automatically register table in REST Catalog on first write
        value: true
      - name: CATALOG_NAMESPACE
        inputType: FreeText
        description: Catalog namespace for table registration
        value: default
      - name: BATCH_SIZE
        inputType: FreeText
        description: Number of messages to batch before writing to storage
        value: 1000
      - name: COMMIT_INTERVAL
        inputType: FreeText
        description: Kafka commit interval in seconds
        value: 30
      - name: KAFKA_KEY_DESERIALIZER
        inputType: FreeText
        description: The key deserializer to use
        value: str
      - name: KAFKA_VALUE_DESERIALIZER
        inputType: FreeText
        description: The value deserializer to use
        value: json
      - name: CONSUMER_GROUP
        inputType: FreeText
        description: Kafka consumer group name
        value: f1-telemetry-sink
      - name: AUTO_OFFSET_RESET
        inputType: FreeText
        description: Where to start consuming if no offset exists
        value: earliest
      - name: LOGLEVEL
        inputType: FreeText
        description: Application logging level
        value: INFO
      - name: MAX_WRITE_WORKERS
        inputType: FreeText
        description: How many files can be written in parallel
        value: 10
      - name: BLOB_PROVIDER
        inputType: FreeText
        value: Gcp
      - name: BLOB_BUCKET
        inputType: FreeText
        value: quixdevbucket
      - name: BLOB_ACCESS_KEY_ID
        inputType: FreeText
        value: GOOG6EUPNLYFI3AQUWE75USN
      - name: BLOB_SECRET_ACCESS_KEY
        inputType: Secret
        value: BLOB_SECRET_ACCESS_KEY
      - name: BLOB_SERVICE_URL
        inputType: FreeText
        value: ""
      - name: CATALOG_URL_OVERRIDE
        inputType: FreeText
        value: "http://lh-cat-aefc6306.quixdev-global.svc.cluster.local:5001"
  - name: F1 Position Sink
    application: quixlake-timeseries-destination
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 500
    desiredStatus: Running
    variables:
      - name: input
        inputType: InputTopic
        value: f1-position-data
      - name: TABLE_NAME
        inputType: FreeText
        value: f1-position-data
      - name: HIVE_COLUMNS
        inputType: FreeText
        value: year,round,race_name,driver_id
      - name: AUTO_OFFSET_RESET
        inputType: FreeText
        value: earliest
      - name: BATCH_SIZE
        inputType: FreeText
        value: 1000
      - name: COMMIT_INTERVAL
        inputType: FreeText
        value: 30
      - name: KAFKA_VALUE_DESERIALIZER
        inputType: FreeText
        value: json
      - name: AUTO_DISCOVER
        inputType: FreeText
        value: true
      - name: CONSUMER_GROUP
        inputType: FreeText
        value: f1-position-sink
      - name: BLOB_PROVIDER
        inputType: FreeText
        value: Gcp
      - name: BLOB_BUCKET
        inputType: FreeText
        value: quixdevbucket
      - name: BLOB_ACCESS_KEY_ID
        inputType: FreeText
        value: GOOG6EUPNLYFI3AQUWE75USN
      - name: BLOB_SECRET_ACCESS_KEY
        inputType: Secret
        value: BLOB_SECRET_ACCESS_KEY
      - name: BLOB_SERVICE_URL
        inputType: FreeText
        value: ""
      - name: CATALOG_URL_OVERRIDE
        inputType: FreeText
        value: "http://lh-cat-aefc6306.quixdev-global.svc.cluster.local:5001"

# This section describes the Topics of the data pipeline
topics:
  - name: f1-car-telemetry
    configuration:
      partitions: 4
      retentionInMinutes: 1440
  - name: f1-lap-data
    configuration:
      partitions: 2
      retentionInMinutes: 1440
  - name: f1-position-data
    configuration:
      partitions: 4
      retentionInMinutes: 1440
