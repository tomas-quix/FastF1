# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 1.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: FastF1 Source
    application: fastf1-source
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 500
        memory: 1000
    desiredStatus: Running
    variables:
      - name: output_telemetry
        inputType: OutputTopic
        description: Car telemetry output topic
        required: true
        value: f1-car-telemetry
      - name: output_lap_data
        inputType: OutputTopic
        description: Lap timing output topic
        required: true
        value: f1-lap-data
      - name: output_position
        inputType: OutputTopic
        description: Position data output topic
        required: true
        value: f1-position-data
      - name: YEAR
        inputType: FreeText
        description: e.g. 2023
        value: 2023
      - name: ROUND
        inputType: FreeText
        description: e.g. 1 for Bahrain GP
        value: 1

# This section describes the Topics of the data pipeline
topics:
  - name: f1-car-telemetry
    configuration:
      partitions: 4
      retentionInMinutes: 1440
  - name: f1-lap-data
    configuration:
      partitions: 2
      retentionInMinutes: 1440
  - name: f1-position-data
    configuration:
      partitions: 4
      retentionInMinutes: 1440
