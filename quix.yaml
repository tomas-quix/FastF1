        inputType: InputTopic
        value: openf1-car-data
      - name: input_laps
        inputType: InputTopic
        value: openf1-laps
      - name: input_intervals
        inputType: InputTopic
        value: openf1-intervals
      - name: input_location
        inputType: InputTopic
        value: openf1-location
      - name: input_pit
        inputType: InputTopic
        value: openf1-pit
      - name: input_position
        inputType: InputTopic
        value: openf1-position
      - name: input_stints
        inputType: InputTopic
        value: openf1-stints
      - name: input_team_radio
        inputType: InputTopic
        value: openf1-team-radio
      - name: CONFIG_TOPIC
        inputType: InputTopic
        value: pipeline-config
      - name: output_car_data
        inputType: OutputTopic
        value: enriched-car-data
      - name: output_laps
        inputType: OutputTopic
        value: enriched-laps
      - name: output_intervals
        inputType: OutputTopic
        value: enriched-intervals
      - name: output_location
        inputType: OutputTopic
        value: enriched-location
      - name: output_pit
        inputType: OutputTopic
        value: enriched-pit
      - name: output_position
        inputType: OutputTopic
        value: enriched-position
      - name: output_stints
        inputType: OutputTopic
        value: enriched-stints
      - name: output_team_radio
        inputType: OutputTopic
        value: enriched-team-radio
      - name: CONSUMER_GROUP_NAME
        inputType: FreeText
        value: config-enricher-v1
      - name: SESSION_KEY
        inputType: FreeText
        value: "9161"
      - name: MEETING_KEY
        inputType: FreeText
        value: "1229"

