# Quix Project Descriptor
# This file describes the data pipeline and configuration of resources of a Quix Project.

metadata:
  version: 2.0

# This section describes the Deployments of the data pipeline
deployments:
  - name: MongoDB
    application: mongodb
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 800
    network:
      serviceName: mongodb
      ports:
        - port: 27017
          targetPort: 27017
  - name: Dynamic Configuration Manager
    application: DynamicConfiguration
    version: latest
    deploymentType: Managed
    resources:
      limits:
        cpu: 500
        memory: 1000
    configuration:
      topic: config-ui
      mongoHost: mongodb
      mongoPort: 80
      mongoUser: admin
      mongoPasswordSecret: MONGO_ROOT_PASSWORD
      mongoDatabase: configurations
      mongoCollection: configurations

