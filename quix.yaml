  - name: MongoDB
    image: mongo:6.0
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 800
    desiredStatus: Running
    state:
      enabled: true
      size: 5
    network:
      serviceName: mongodb
      ports:
        - port: 27017
          targetPort: 27017
    variables:
      - name: MONGO_INITDB_ROOT_USERNAME
        inputType: FreeText
        value: admin
      - name: MONGO_INITDB_ROOT_PASSWORD
        inputType: ProjectVariable
        value: MONGO_ROOT_PASSWORD
  - name: Dynamic Configuration Manager
    application: DynamicConfiguration
    version: latest
    deploymentType: Managed
    resources:
      limits:
        cpu: 500
        memory: 1000
    desiredStatus: Running
    network:
      serviceName: config-manager
      ports:
        - port: 80
          targetPort: 80
    configuration:
      topic: pipeline-config
      consumerGroup: config-api-v1
      mongoHost: mongodb
      mongoPort: "27017"
      mongoUser: admin
      mongoPasswordSecret: MONGO_ROOT_PASSWORD
      mongoDatabase: openf1_config
      mongoCollection: metadata
      contentStore: mongo
      port: "80"
  - name: Metadata Loader
    application: metadata-loader
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 200
        memory: 300
    desiredStatus: Running
    variables:
      - name: input_drivers
        inputType: InputTopic
        value: openf1-drivers
      - name: input_meetings
        inputType: InputTopic
        value: openf1-meetings
      - name: input_sessions
        inputType: InputTopic
        value: openf1-sessions
      - name: CONFIG_SERVICE_URL
        inputType: FreeText
        value: http://config-manager:80
  - name: Config Enricher
    application: config-enricher
    version: latest
    deploymentType: Service
    resources:
      limits:
        cpu: 300
        memory: 500
    desiredStatus: Running
    variables:
