metadata:
  version: 1.0

deployments:
  - name: FastF1 Source
    application: fastf1-source
    deploymentType: Job
    version: latest
    desiredStatus: Running
    resources:
      cpu: 500
      memory: 1000
      replicas: 1
    state:
      enabled: true
      size: 5
    variables:
      - name: output_laps
        inputType: OutputTopic
        value: f1-laps
      - name: output_car_telemetry
        inputType: OutputTopic
        value: f1-car-telemetry
      - name: output_position
        inputType: OutputTopic
        value: f1-position-data
      - name: output_results
        inputType: OutputTopic
        value: f1-session-results
      - name: output_weather
        inputType: OutputTopic
        value: f1-weather
      - name: YEAR
        inputType: FreeText
        value: "2024"
      - name: EVENT
        inputType: FreeText
        value: "Monaco"
      - name: SESSION_TYPE
        inputType: FreeText
        value: "R"

topics:
  - name: f1-laps
    configuration:
      partitions: 2
      retentionInMinutes: 10080
  - name: f1-car-telemetry
    configuration:
      partitions: 4
      retentionInMinutes: 10080
  - name: f1-position-data
    configuration:
      partitions: 4
      retentionInMinutes: 10080
  - name: f1-session-results
    configuration:
      partitions: 1
      retentionInMinutes: 10080
  - name: f1-weather
    configuration:
      partitions: 1
      retentionInMinutes: 10080
