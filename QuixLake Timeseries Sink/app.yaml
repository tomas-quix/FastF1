name: QuixLake Timeseries Sink
language: python
variables:
  - name: input
    inputType: InputTopic
    description: "Input topic to consume from"
    required: true
  - name: TABLE_NAME
    inputType: FreeText
    description: "Target table name in the data lake"
    required: true
  - name: AUTO_OFFSET_RESET
    inputType: FreeText
    description: "Kafka consumer auto offset reset (earliest or latest)"
    defaultValue: latest
    required: false
  - name: CONSUMER_GROUP
    inputType: FreeText
    description: "Kafka consumer group ID"
    required: false
  - name: HIVE_COLUMNS
    inputType: FreeText
    description: "Comma-separated list of Hive partition columns"
    defaultValue: ""
    required: false
  - name: BATCH_SIZE
    inputType: FreeText
    description: "Number of records per batch commit"
    defaultValue: "1000"
    required: false
  - name: COMMIT_INTERVAL
    inputType: FreeText
    description: "Commit interval in seconds"
    defaultValue: "30"
    required: false
dockerfile: dockerfile
runEntryPoint: main.py
defaultFile: main.py
